<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mobile Freeform Lite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap">
  <style>
    :root {
      --bg-1: #f8f3ec;
      --bg-2: #e9eef4;
      --paper: #fffdf8;
      --panel: rgba(255, 255, 255, 0.9);
      --panel-strong: #ffffff;
      --ink: #1c1c1c;
      --muted: #6f747a;
      --accent: #0a84ff;
      --accent-ink: #0b3d7a;
      --border: rgba(17, 24, 39, 0.12);
      --shadow-soft: 0 14px 30px rgba(15, 23, 42, 0.18);
      --shadow-tight: 0 6px 16px rgba(15, 23, 42, 0.12);
      --radius: 20px;
      --btn: 40px;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      background:
        radial-gradient(1400px 900px at 10% -10%, #ffffff 0%, #f7f2ea 40%, transparent 70%),
        radial-gradient(1200px 800px at 110% 0%, #f2f6fb 0%, transparent 60%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      color: var(--ink);
      font-family: "Manrope", "SF Pro Display", "Segoe UI", system-ui, -apple-system, sans-serif;
      letter-spacing: 0.1px;
    }
    :root { --vh: 1vh; }
    #app {
      height: calc(var(--vh) * 100);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    #toolbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: block;
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(245, 248, 251, 0.92));
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(15, 23, 42, 0.12);
      box-shadow: 0 -14px 32px rgba(15, 23, 42, 0.2);
      overflow: visible;
      z-index: 200;
      animation: toolbar-in 0.5s ease;
    }
    @keyframes toolbar-in {
      from { transform: translateY(16px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    #toolbar::before {
      content: '';
      position: absolute;
      left: 18px;
      right: 18px;
      top: 0;
      height: 1px;
      background: rgba(255, 255, 255, 0.6);
      pointer-events: none;
    }
    .toolbar-row {
      display: block;
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .toolbar-row::-webkit-scrollbar { display: none; }
    .toolbar-scroll {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 2px 4px;
      min-width: max-content;
      max-width: 1200px;
      margin: 0 auto;
    }
    .group {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      background: var(--panel);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow-tight);
      backdrop-filter: blur(12px);
      flex: 0 0 auto;
    }
    .tool-group {
      flex: 0 0 auto;
      min-width: auto;
      overflow: visible;
      gap: 6px;
      padding: 8px;
      border-radius: 22px;
    }
    .control-group { padding: 6px 8px; }
    .action-group { gap: 6px; padding: 6px; }
    .tool-btn, .color-btn, .action-btn, .width-btn, .toggle-btn {
      border: 1px solid rgba(15, 23, 42, 0.08);
      background: #f5f6f9;
      color: var(--ink);
      padding: 0 10px;
      border-radius: 12px;
      font-size: 12px;
      min-width: var(--btn);
      height: var(--btn);
      text-align: center;
      user-select: none;
      touch-action: manipulation;
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0.12s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }
    .tool-btn, .action-btn { padding: 0; width: var(--btn); }
    .tool-btn {
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(241,244,248,0.9));
      border-color: rgba(15, 23, 42, 0.1);
    }
    .tool-btn.active::after {
      content: '';
      position: absolute;
      bottom: 4px;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.15);
    }
    .tool-btn { position: relative; }
    .action-btn {
      border-radius: 999px;
      background: #f2f4f8;
    }
    button { font-family: inherit; }
    .tool-btn:active, .action-btn:active, .toggle-btn:active, .width-btn:active, .color-btn:active {
      transform: translateY(1px) scale(0.98);
    }
    .tool-btn:focus-visible, .action-btn:focus-visible, .toggle-btn:focus-visible, .width-btn:focus-visible, .color-btn:focus-visible {
      outline: 2px solid rgba(10, 132, 255, 0.4);
      outline-offset: 2px;
    }
    .tool-btn.active, .action-btn.active, .width-btn.active, .toggle-btn.active {
      background: linear-gradient(180deg, rgba(10, 132, 255, 0.2), rgba(10, 132, 255, 0.08));
      border-color: rgba(10, 132, 255, 0.45);
      box-shadow: inset 0 0 0 2px rgba(10, 132, 255, 0.2), 0 6px 14px rgba(10, 132, 255, 0.18);
      color: var(--accent-ink);
      font-weight: 600;
    }
    .color-btn {
      width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 999px;
      min-width: 28px;
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.12), 0 6px 14px rgba(15,23,42,0.16);
    }
    .color-btn.active {
      border: 2px solid var(--accent);
      box-shadow: 0 0 0 2px rgba(10, 132, 255, 0.35), 0 8px 16px rgba(15,23,42,0.2);
    }
    .tool-btn .icon, .action-btn .icon, .toggle-btn .icon {
      width: 18px;
      height: 18px;
      display: block;
    }
    .tool-btn svg, .action-btn svg, .toggle-btn svg {
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .width-group { display: flex; align-items: center; gap: 6px; }
    .panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 10px 8px;
      position: static;
      margin-top: 8px;
      background: var(--panel-strong);
      border: 1px solid rgba(15, 23, 42, 0.12);
      border-radius: 16px;
      box-shadow: 0 18px 36px rgba(15, 23, 42, 0.2);
      z-index: 300;
    }
    .group.open .panel { display: flex; animation: panel-pop 0.18s ease; transform-origin: top center; }
    @keyframes panel-pop {
      from { transform: translateY(-4px) scale(0.98); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
    .group.open {
      flex-direction: column;
      align-items: center;
      box-shadow: var(--shadow-soft);
    }
    .toggle-btn {
      min-width: 92px;
      height: 36px;
      padding: 0 12px;
      position: relative;
      border-radius: 999px;
    }
    .toggle-btn::after {
      content: '';
      width: 6px;
      height: 6px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg);
      margin-left: 6px;
      opacity: 0.7;
    }
    .group.open .toggle-btn::after {
      transform: rotate(-135deg);
    }
    .toggle-btn .label { font-weight: 600; }
    .width-btn {
      min-width: 32px;
      height: 32px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #f6f7fa;
      border: 1px solid rgba(15, 23, 42, 0.1);
    }
    .width-btn:active { transform: translateY(1px) scale(0.98); }
    .width-sample {
      display: block;
      width: var(--dot, 8px);
      height: var(--dot, 8px);
      background: currentColor;
      border-radius: 999px;
    }
    #canvas-wrap {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      background: radial-gradient(600px 420px at 18% 8%, rgba(10, 132, 255, 0.06), transparent 60%), var(--paper);
    }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; position: relative; z-index: 1; }
    .spacer { flex: 1 1 auto; }
    @media (max-width: 420px) {
      .toggle-btn { min-width: 78px; font-size: 11px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <div class="toolbar-row">
        <div class="toolbar-scroll">
        <div class="group action-group" id="action-group">
        <button class="action-btn" id="undo" title="Undo" aria-label="Undo">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 7H4v5"></path>
            <path d="M4 12c1.6-4 6.3-6 10.3-3.9 2.6 1.4 3.7 4.6 2.6 7.4"></path>
          </svg>
        </button>
        <button class="action-btn" id="redo" title="Redo" aria-label="Redo">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 7h5v5"></path>
            <path d="M20 12c-1.6-4-6.3-6-10.3-3.9-2.6 1.4-3.7 4.6-2.6 7.4"></path>
          </svg>
        </button>
        </div>
        <div class="group tool-group" id="tool-group">
        <button class="tool-btn" data-tool="pen" title="Pen" aria-label="Pen">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <line x1="4" y1="20" x2="20" y2="4"></line>
            <line x1="14" y1="4" x2="20" y2="10"></line>
          </svg>
        </button>
        <button class="tool-btn" data-tool="line" title="Line" aria-label="Line">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <line x1="4" y1="12" x2="20" y2="12"></line>
          </svg>
        </button>
        <button class="tool-btn" data-tool="circle" title="Circle" aria-label="Circle">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="7"></circle>
          </svg>
        </button>
        <button class="tool-btn" data-tool="select" title="Select" aria-label="Select">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="7" stroke-dasharray="3 3"></circle>
          </svg>
        </button>
        <button class="tool-btn" data-tool="erase-pixel" title="Eraser" aria-label="Eraser">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="5" y="7" width="10" height="8" rx="2"></rect>
            <line x1="9" y1="17" x2="20" y2="17"></line>
          </svg>
        </button>
        <button class="tool-btn" data-tool="erase-object" title="Object Erase" aria-label="Object Erase">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="6" y="6" width="12" height="12" rx="2"></rect>
            <line x1="9" y1="9" x2="15" y2="15"></line>
            <line x1="15" y1="9" x2="9" y2="15"></line>
          </svg>
        </button>
        </div>

        <div class="group control-group width-group" id="width-group">
        <button class="toggle-btn" id="toggle-width" title="Stroke" aria-label="Stroke">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <line x1="4" y1="12" x2="20" y2="12"></line>
            <circle cx="4" cy="12" r="2"></circle>
            <circle cx="20" cy="12" r="2"></circle>
          </svg>
          <span class="label">Stroke</span>
        </button>
        <div class="panel" id="width-panel">
          <button class="width-btn" data-width="2" style="--dot:2px"><span class="width-sample"></span></button>
          <button class="width-btn" data-width="4" style="--dot:4px"><span class="width-sample"></span></button>
          <button class="width-btn" data-width="6" style="--dot:6px"><span class="width-sample"></span></button>
          <button class="width-btn" data-width="8" style="--dot:8px"><span class="width-sample"></span></button>
          <button class="width-btn" data-width="12" style="--dot:12px"><span class="width-sample"></span></button>
          <button class="width-btn" data-width="16" style="--dot:16px"><span class="width-sample"></span></button>
        </div>
        </div>

        <div class="group control-group" id="color-group">
        <button class="toggle-btn" id="toggle-color" title="Color" aria-label="Color">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3c4.9 0 9 3.1 9 7 0 2.5-1.6 4-4.1 4h-1.6a1.5 1.5 0 0 0-1.5 1.5v.3a2 2 0 0 1-2 2h-.3C7 18.8 3 15.8 3 11c0-4.2 4.1-8 9-8z"></path>
            <circle cx="8.5" cy="10.2" r="1.1"></circle>
            <circle cx="12" cy="7.8" r="1.1"></circle>
            <circle cx="15.5" cy="10.2" r="1.1"></circle>
          </svg>
          <span class="label">Color</span>
        </button>
        <div class="panel" id="color-panel">
          <button class="color-btn" data-color="#111111" style="background:#111111;"></button>
          <button class="color-btn" data-color="#e53935" style="background:#e53935;"></button>
          <button class="color-btn" data-color="#1e88e5" style="background:#1e88e5;"></button>
          <button class="color-btn" data-color="#43a047" style="background:#43a047;"></button>
        </div>
        </div>

        </div>
      </div>
    </div>
    <div id="canvas-wrap">
      <canvas id="c"></canvas>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
  <script>
    (function () {
      const canvasEl = document.getElementById('c');
      const wrapEl = document.getElementById('canvas-wrap');
      const canvas = new fabric.Canvas('c', {
        selection: false,
        preserveObjectStacking: true
      });
      const defaultPerPixelTargetFind = canvas.perPixelTargetFind;
      const defaultTargetFindTolerance = canvas.targetFindTolerance;

      canvas.upperCanvasEl.style.touchAction = 'none';

      function setViewportHeight() {
        const height = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--vh', `${height * 0.01}px`);
      }

      function resizeCanvas() {
        const rect = wrapEl.getBoundingClientRect();
        canvas.setWidth(rect.width);
        canvas.setHeight(rect.height);
        canvas.requestRenderAll();
      }
      function scheduleLayout() {
        setViewportHeight();
        requestAnimationFrame(resizeCanvas);
      }
      window.addEventListener('resize', scheduleLayout);
      window.addEventListener('orientationchange', () => {
        setTimeout(scheduleLayout, 50);
      });
      window.addEventListener('pageshow', scheduleLayout);
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) scheduleLayout();
      });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', scheduleLayout);
        window.visualViewport.addEventListener('scroll', setViewportHeight);
      }
      setViewportHeight();
      resizeCanvas();
      setTimeout(scheduleLayout, 50);

      const toolButtons = Array.from(document.querySelectorAll('.tool-btn'));
      const colorButtons = Array.from(document.querySelectorAll('.color-btn'));
      const widthButtons = Array.from(document.querySelectorAll('.width-btn'));
      const toggleWidthBtn = document.getElementById('toggle-width');
      const toggleColorBtn = document.getElementById('toggle-color');
      const widthGroup = document.getElementById('width-group');
      const colorGroup = document.getElementById('color-group');
      const widthPanel = document.getElementById('width-panel');
      const colorPanel = document.getElementById('color-panel');
      const toolbarEl = document.getElementById('toolbar');
      const undoBtn = document.getElementById('undo');
      const redoBtn = document.getElementById('redo');

      let currentTool = 'pen';
      let currentColor = '#111111';
      let currentWidth = 4;
      let penBrush = null;
      let pixelEraserBrush = null;
      let suppressPointerId = null;
      let suppressToggleWidth = false;
      let suppressToggleColor = false;

      const HISTORY_LIMIT = 30;
      const historyStack = [];
      const redoStack = [];
      let isRestoring = false;

      function updateUndoRedo() {
        undoBtn.disabled = historyStack.length <= 1;
        redoBtn.disabled = redoStack.length === 0;
      }

      function captureState() {
        const json = JSON.stringify(canvas.toDatalessJSON([
          '_isEraserPath',
          'globalCompositeOperation',
          'selectable',
          'evented',
          'strokeUniform',
          'strokeLineCap',
          'strokeLineJoin'
        ]));
        const vpt = canvas.viewportTransform ? canvas.viewportTransform.slice() : null;
        return { json, vpt };
      }

      function sameState(a, b) {
        if (!a || !b) return false;
        if (a.json !== b.json) return false;
        if (!a.vpt && !b.vpt) return true;
        if (!a.vpt || !b.vpt) return false;
        for (let i = 0; i < 6; i++) {
          if (a.vpt[i] !== b.vpt[i]) return false;
        }
        return true;
      }

      function pushHistory() {
        if (isRestoring) return;
        const state = captureState();
        const last = historyStack[historyStack.length - 1];
        if (sameState(last, state)) return;
        historyStack.push(state);
        if (historyStack.length > HISTORY_LIMIT) {
          historyStack.shift();
        }
        redoStack.length = 0;
        updateUndoRedo();
      }

      function pushAction() {
        pushHistory();
      }

      function restoreState(state) {
        if (!state) return;
        isRestoring = true;
        canvas.loadFromJSON(state.json, () => {
          if (state.vpt) {
            canvas.setViewportTransform(state.vpt.slice());
          }
          canvas.discardActiveObject();
          canvas.renderAll();
          isRestoring = false;
          updateUndoRedo();
        });
      }

      function undo() {
        if (isRestoring) return;
        if (historyStack.length <= 1) return;
        const current = historyStack.pop();
        redoStack.push(current);
        const prev = historyStack[historyStack.length - 1];
        restoreState(prev);
      }

      function redo() {
        if (isRestoring) return;
        const next = redoStack.pop();
        if (!next) return;
        historyStack.push(next);
        restoreState(next);
      }

      undoBtn.addEventListener('click', undo);
      redoBtn.addEventListener('click', redo);
      updateUndoRedo();

      function setTool(tool) {
        currentTool = tool;
        toolButtons.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.tool === tool);
        });
        if (tool === 'pen') {
          canvas.isDrawingMode = true;
          canvas.selection = false;
          canvas.skipTargetFind = true;
          if (penBrush) canvas.freeDrawingBrush = penBrush;
        } else if (tool === 'erase-pixel') {
          canvas.isDrawingMode = true;
          canvas.selection = false;
          canvas.skipTargetFind = true;
          if (pixelEraserBrush) canvas.freeDrawingBrush = pixelEraserBrush;
        } else if (tool === 'select') {
          canvas.isDrawingMode = false;
          canvas.selection = false;
          canvas.skipTargetFind = false;
        } else if (tool === 'erase-object') {
          canvas.isDrawingMode = false;
          canvas.selection = false;
          canvas.skipTargetFind = true;
          canvas.perPixelTargetFind = true;
          canvas.targetFindTolerance = 0;
        } else {
          canvas.isDrawingMode = false;
          canvas.selection = false;
          canvas.skipTargetFind = true;
        }
        if (tool !== 'erase-object') {
          canvas.perPixelTargetFind = defaultPerPixelTargetFind;
          canvas.targetFindTolerance = defaultTargetFindTolerance;
        }
        if (tool !== 'select') {
          canvas.discardActiveObject();
          canvas.requestRenderAll();
        }
      }

      toolButtons.forEach(btn => {
        btn.addEventListener('click', () => setTool(btn.dataset.tool));
      });

      function closePanels(except) {
        if (except !== widthGroup) widthGroup.classList.remove('open');
        if (except !== colorGroup) colorGroup.classList.remove('open');
        toggleWidthBtn.classList.toggle('active', widthGroup.classList.contains('open'));
        toggleColorBtn.classList.toggle('active', colorGroup.classList.contains('open'));
      }

      toggleWidthBtn.addEventListener('click', () => {
        if (suppressToggleWidth) {
          suppressToggleWidth = false;
          return;
        }
        widthGroup.classList.toggle('open');
        closePanels(widthGroup);
      });

      toggleColorBtn.addEventListener('click', () => {
        if (suppressToggleColor) {
          suppressToggleColor = false;
          return;
        }
        colorGroup.classList.toggle('open');
        closePanels(colorGroup);
      });
      closePanels();

      function isInsideOpenPanel(target) {
        if (widthGroup.classList.contains('open') && widthPanel.contains(target)) return true;
        if (colorGroup.classList.contains('open') && colorPanel.contains(target)) return true;
        return false;
      }

      function handleOutsidePointerDown(e) {
        const isPanelOpen =
          widthGroup.classList.contains('open') || colorGroup.classList.contains('open');
        if (!isPanelOpen) return;
        if (isInsideOpenPanel(e.target)) return;
        if (widthGroup.classList.contains('open') && toggleWidthBtn.contains(e.target)) {
          suppressToggleWidth = true;
        }
        if (colorGroup.classList.contains('open') && toggleColorBtn.contains(e.target)) {
          suppressToggleColor = true;
        }
        closePanels();
        cancelPendingDraw();
        blockDrawing = true;
        suppressPointerId = e.pointerId;
      }

      document.addEventListener('pointerdown', handleOutsidePointerDown, true);
      canvas.upperCanvasEl.addEventListener('pointerdown', handleOutsidePointerDown, true);
      document.addEventListener('pointerup', (e) => {
        if (suppressPointerId === e.pointerId) {
          suppressPointerId = null;
          blockDrawing = false;
        }
      });
      document.addEventListener('pointercancel', (e) => {
        if (suppressPointerId === e.pointerId) {
          suppressPointerId = null;
          blockDrawing = false;
        }
      });
      toolbarEl.addEventListener('pointerdown', (e) => {
        cancelPendingDraw();
        blockDrawing = true;
        e.stopPropagation();
      });
      toolbarEl.addEventListener('pointerup', (e) => {
        blockDrawing = false;
        e.stopPropagation();
      });
      toolbarEl.addEventListener('pointercancel', (e) => {
        blockDrawing = false;
        e.stopPropagation();
      });

      colorButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          currentColor = btn.dataset.color;
          colorButtons.forEach(b => b.classList.toggle('active', b === btn));
          if (penBrush) {
            penBrush.color = currentColor;
          }
          if (canvas.freeDrawingBrush === penBrush) {
            canvas.freeDrawingBrush.color = currentColor;
          }
          closePanels(colorGroup);
        });
      });

      function setWidth(width) {
        currentWidth = width;
        if (penBrush) penBrush.width = currentWidth;
        if (pixelEraserBrush) pixelEraserBrush.width = currentWidth;
        widthButtons.forEach(btn => {
          btn.classList.toggle('active', parseInt(btn.dataset.width, 10) === width);
        });
      }

      widthButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          setWidth(parseInt(btn.dataset.width, 10));
          closePanels(widthGroup);
        });
      });

      penBrush = new fabric.PencilBrush(canvas);
      penBrush.decimate = 0.35;
      penBrush.strokeLineCap = 'round';
      penBrush.strokeLineJoin = 'round';

      pixelEraserBrush = new fabric.PencilBrush(canvas);
      pixelEraserBrush.decimate = 0.2;
      pixelEraserBrush.color = '#ffffff';
      pixelEraserBrush.globalCompositeOperation = 'destination-out';
      pixelEraserBrush.strokeLineCap = 'round';
      pixelEraserBrush.strokeLineJoin = 'round';

      colorButtons[0].click();
      setWidth(4);
      setTool('pen');
      pushHistory();

      canvas.on('path:created', (opt) => {
        const path = opt.path;
        if (currentTool === 'erase-pixel') {
          path.stroke = '#ffffff';
          path.globalCompositeOperation = 'destination-out';
          path.selectable = false;
          path.evented = false;
          path._isEraserPath = true;
        } else {
          path.selectable = true;
          path.evented = true;
          path.strokeUniform = true;
        }
        path.setCoords();
        pushAction({ type: 'add', objects: [path] });
      });

      function findTargetForAction(e) {
        const prev = canvas.skipTargetFind;
        canvas.skipTargetFind = false;
        const target = canvas.findTarget(e);
        canvas.skipTargetFind = prev;
        return target;
      }

      canvas.on('object:modified', () => {
        if (isRestoring) return;
        pushHistory();
      });

      // Pointer helpers
      function getCanvasPointFromClient(clientX, clientY) {
        const rect = canvas.upperCanvasEl.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        const pt = new fabric.Point(x, y);
        return fabric.util.transformPoint(pt, fabric.util.invertTransform(canvas.viewportTransform));
      }

      // Lasso selection
      let lassoPath = null;
      let lassoPoints = [];
      let lassoPointerId = null;
      let isLassoDrawing = false;

      function pointInPoly(point, poly) {
        let inside = false;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
          const xi = poly[i].x, yi = poly[i].y;
          const xj = poly[j].x, yj = poly[j].y;
          const intersect = ((yi > point.y) !== (yj > point.y)) &&
            (point.x < (xj - xi) * (point.y - yi) / (yj - yi + 0.0000001) + xi);
          if (intersect) inside = !inside;
        }
        return inside;
      }

      function finalizeLasso() {
        if (lassoPath) {
          canvas.remove(lassoPath);
          lassoPath = null;
        }
        canvas.skipTargetFind = false;
        if (lassoPoints.length < 3) {
          canvas.discardActiveObject();
          canvas.requestRenderAll();
          return;
        }

        const objects = canvas.getObjects().filter(obj => obj !== lassoPath && !obj._isEraserPath);
        const selected = [];
        objects.forEach(obj => {
          const corners = obj.getCoords();
          const allInside = corners.every(pt => pointInPoly({ x: pt.x, y: pt.y }, lassoPoints));
          if (allInside) selected.push(obj);
        });

        if (selected.length === 1) {
          canvas.setActiveObject(selected[0]);
        } else if (selected.length > 1) {
          const sel = new fabric.ActiveSelection(selected, { canvas: canvas });
          canvas.setActiveObject(sel);
        } else {
          canvas.discardActiveObject();
        }
        canvas.requestRenderAll();
      }

      // Line tool
      let tempLine = null;
      let lineStart = null;
      let isLineDrawing = false;

      function startLine(point) {
        isLineDrawing = true;
        lineStart = point;
        tempLine = new fabric.Line([point.x, point.y, point.x, point.y], {
          stroke: currentColor,
          strokeWidth: currentWidth,
          selectable: true,
          evented: true,
          strokeLineCap: 'round',
          strokeLineJoin: 'round'
        });
        tempLine.strokeUniform = true;
        canvas.add(tempLine);
      }

      function updateLine(point) {
        if (!tempLine) return;
        tempLine.set({ x2: point.x, y2: point.y });
        tempLine.setCoords();
        canvas.requestRenderAll();
      }

      function finishLine() {
        if (!tempLine) return;
        pushAction({ type: 'add', objects: [tempLine] });
        tempLine = null;
        isLineDrawing = false;
      }

      // Circle tool
      let tempCircle = null;
      let circleCenter = null;
      let isCircleDrawing = false;

      function startCircle(point) {
        isCircleDrawing = true;
        circleCenter = point;
        tempCircle = new fabric.Circle({
          left: point.x,
          top: point.y,
          radius: 0.1,
          stroke: currentColor,
          strokeWidth: currentWidth,
          fill: 'transparent',
          selectable: true,
          evented: true,
          originX: 'center',
          originY: 'center'
        });
        tempCircle.strokeUniform = true;
        canvas.add(tempCircle);
      }

      function updateCircle(point) {
        if (!tempCircle || !circleCenter) return;
        const dx = point.x - circleCenter.x;
        const dy = point.y - circleCenter.y;
        const radius = Math.max(1, Math.hypot(dx, dy));
        tempCircle.set({ radius: radius });
        tempCircle.setCoords();
        canvas.requestRenderAll();
      }

      function finishCircle() {
        if (!tempCircle) return;
        pushAction({ type: 'add', objects: [tempCircle] });
        tempCircle = null;
        isCircleDrawing = false;
      }

      // Object eraser
      let isObjectErasing = false;
      let erasedItems = [];
      let erasedSet = new Set();

      function removeObject(obj) {
        if (!obj || obj._isEraserPath) return;
        if (erasedSet.has(obj)) return;
        const index = canvas.getObjects().indexOf(obj);
        erasedSet.add(obj);
        erasedItems.push({ obj, index });
        canvas.remove(obj);
      }

      function eraseAtEvent(e) {
        const target = findTargetForAction(e);
        if (!target) return;
        if (target.type === 'activeSelection') {
          target._objects.forEach(removeObject);
          canvas.discardActiveObject();
        } else {
          removeObject(target);
        }
      }

      function startObjectErase(e) {
        isObjectErasing = true;
        erasedItems = [];
        erasedSet = new Set();
        eraseAtEvent(e);
      }

      function finishObjectErase() {
        if (!isObjectErasing) return;
        if (erasedItems.length > 0) {
          pushAction({ type: 'remove', objects: erasedItems });
        }
        isObjectErasing = false;
        erasedItems = [];
        erasedSet = new Set();
      }

      // Pinch zoom + pan
      const pointers = new Map();
      let isGesturing = false;
      let gestureState = null;
      let blockDrawing = false;
      let drawDelayTimer = null;
      let pendingDraw = null;

      const originalMouseDownInDrawingMode = canvas._onMouseDownInDrawingMode.bind(canvas);
      const originalMouseMoveInDrawingMode = canvas._onMouseMoveInDrawingMode.bind(canvas);

      canvas._onMouseDownInDrawingMode = function (e) {
        if (blockDrawing) return;
        return originalMouseDownInDrawingMode(e);
      };
      canvas._onMouseMoveInDrawingMode = function (e) {
        if (blockDrawing) return;
        return originalMouseMoveInDrawingMode(e);
      };

      function cancelPendingDraw() {
        if (drawDelayTimer) {
          clearTimeout(drawDelayTimer);
          drawDelayTimer = null;
        }
        pendingDraw = null;
      }

      function scheduleTouchDraw(e) {
        cancelPendingDraw();
        blockDrawing = true;
        pendingDraw = { e, pointerId: e.pointerId };
        drawDelayTimer = setTimeout(() => {
          if (!pendingDraw) return;
          blockDrawing = false;
          if (currentTool === 'pen' || currentTool === 'erase-pixel') {
            originalMouseDownInDrawingMode(pendingDraw.e);
          }
          pendingDraw = null;
        }, 90);
      }

      function getPointerInfo(e) {
        return { x: e.clientX, y: e.clientY, type: e.pointerType };
      }

      function isTwoTouchGesture() {
        if (pointers.size < 2) return false;
        const vals = Array.from(pointers.values());
        return vals[0].type === 'touch' && vals[1].type === 'touch';
      }

      function startGesture() {
        cancelPendingDraw();
        blockDrawing = true;
        const vals = Array.from(pointers.values());
        const p1 = vals[0];
        const p2 = vals[1];
        const mid = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
        const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
        isGesturing = true;
        gestureState = {
          startDist: dist,
          startZoom: canvas.getZoom(),
          lastMid: mid
        };
        canvas.isDrawingMode = false;
        isLassoDrawing = false;
        isLineDrawing = false;
        isCircleDrawing = false;
        isObjectErasing = false;
        erasedItems = [];
        erasedSet = new Set();
      }

      function updateGesture() {
        if (!gestureState) return;
        const vals = Array.from(pointers.values());
        if (vals.length < 2) return;
        const p1 = vals[0];
        const p2 = vals[1];
        const mid = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
        const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
        const scale = dist / gestureState.startDist;
        const newZoom = Math.min(4, Math.max(0.5, gestureState.startZoom * scale));
        const zoomPoint = getCanvasPointFromClient(mid.x, mid.y);
        canvas.zoomToPoint(zoomPoint, newZoom);
        const dx = mid.x - gestureState.lastMid.x;
        const dy = mid.y - gestureState.lastMid.y;
        const vpt = canvas.viewportTransform;
        vpt[4] += dx;
        vpt[5] += dy;
        canvas.requestRenderAll();
        gestureState.lastMid = mid;
      }

      function endGesture() {
        isGesturing = false;
        gestureState = null;
        blockDrawing = false;
        if (currentTool === 'pen' || currentTool === 'erase-pixel') {
          canvas.isDrawingMode = true;
        }
      }

      function pointerDown(e) {
        canvas.upperCanvasEl.setPointerCapture(e.pointerId);
        pointers.set(e.pointerId, getPointerInfo(e));

        if (isTwoTouchGesture()) {
          startGesture();
          return;
        }
        if (isGesturing) return;
        if (suppressPointerId === e.pointerId) return;

        const point = canvas.getPointer(e);
        if ((currentTool === 'pen' || currentTool === 'erase-pixel') && e.pointerType === 'touch') {
          scheduleTouchDraw(e);
        }
        if (currentTool === 'erase-object') {
          startObjectErase(e);
          return;
        }
        if (currentTool === 'line') {
          startLine(point);
        } else if (currentTool === 'circle') {
          startCircle(point);
        } else if (currentTool === 'select') {
          const target = canvas.findTarget(e);
          const active = canvas.getActiveObject();
          if (target) return;
          if (active) {
            const rect = active.getBoundingRect(true, true);
            const insideActiveBounds =
              point.x >= rect.left &&
              point.x <= rect.left + rect.width &&
              point.y >= rect.top &&
              point.y <= rect.top + rect.height;
            if (insideActiveBounds) return;
          }
          canvas.discardActiveObject();
          canvas.requestRenderAll();
          isLassoDrawing = true;
          lassoPointerId = e.pointerId;
          canvas.skipTargetFind = true;
          lassoPoints = [point];
          lassoPath = new fabric.Polyline(lassoPoints, {
            fill: '',
            stroke: '#0a84ff',
            strokeWidth: 2,
            selectable: false,
            evented: false,
            strokeDashArray: [6, 4],
            objectCaching: false
          });
          canvas.add(lassoPath);
          canvas.bringToFront(lassoPath);
        }
      }

      function pointerMove(e) {
        if (pointers.has(e.pointerId)) {
          pointers.set(e.pointerId, getPointerInfo(e));
        }

        if (isGesturing) {
          updateGesture();
          return;
        }

        const point = canvas.getPointer(e);
        if (pendingDraw && pendingDraw.pointerId === e.pointerId) {
          pendingDraw.e = e;
        }
        if (currentTool === 'erase-object' && isObjectErasing) {
          eraseAtEvent(e);
          return;
        }
        if (currentTool === 'line' && isLineDrawing) {
          updateLine(point);
        } else if (currentTool === 'circle' && isCircleDrawing) {
          updateCircle(point);
        } else if (currentTool === 'select' && isLassoDrawing && e.pointerId === lassoPointerId) {
          const last = lassoPoints[lassoPoints.length - 1];
          const dist = Math.hypot(point.x - last.x, point.y - last.y);
          if (dist > 2) {
            lassoPoints.push(point);
            lassoPath.set({ points: lassoPoints });
            lassoPath.setCoords();
            canvas.bringToFront(lassoPath);
            canvas.requestRenderAll();
          }
        }
      }

      function pointerUp(e) {
        pointers.delete(e.pointerId);
        if (isGesturing) {
          if (pointers.size < 2) endGesture();
          return;
        }

        if (suppressPointerId === e.pointerId) {
          suppressPointerId = null;
          blockDrawing = false;
          cancelPendingDraw();
          return;
        }
        if (pendingDraw && pendingDraw.pointerId === e.pointerId) {
          cancelPendingDraw();
          blockDrawing = false;
        }
        if (currentTool === 'erase-object' && isObjectErasing) {
          finishObjectErase();
          return;
        }
        if (currentTool === 'line' && isLineDrawing) {
          finishLine();
        } else if (currentTool === 'circle' && isCircleDrawing) {
          finishCircle();
        } else if (currentTool === 'select' && isLassoDrawing && e.pointerId === lassoPointerId) {
          isLassoDrawing = false;
          lassoPointerId = null;
          finalizeLasso();
        }
      }

      canvas.upperCanvasEl.addEventListener('pointerdown', pointerDown);
      canvas.upperCanvasEl.addEventListener('pointermove', pointerMove);
      canvas.upperCanvasEl.addEventListener('pointerup', pointerUp);
      canvas.upperCanvasEl.addEventListener('pointercancel', pointerUp);
    })();
  </script>
</body>
</html>
