<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mobile Freeform Lite</title>
  <style>
    :root {
      --bg: #f5f5f2;
      --panel: #ffffff;
      --ink: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #0a84ff;
      --border: #e2e2df;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--ink); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
    #app { height: 100%; display: flex; flex-direction: column; }
    #toolbar {
      position: sticky;
      bottom: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .group {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      flex: 0 0 auto;
    }
    .tool-btn, .color-btn, .action-btn, .width-btn, .toggle-btn {
      border: 1px solid transparent;
      background: #f6f6f6;
      color: var(--ink);
      padding: 6px 10px;
      border-radius: 12px;
      font-size: 12px;
      min-width: 54px;
      height: 32px;
      text-align: center;
      user-select: none;
      touch-action: manipulation;
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tool-btn.active, .action-btn.active, .width-btn.active, .toggle-btn.active {
      background: linear-gradient(180deg, #eaf3ff, #d8e9ff);
      border-color: rgba(10, 132, 255, 0.4);
      box-shadow: inset 0 0 0 1px rgba(10, 132, 255, 0.25);
      color: #0a4ea3;
      font-weight: 600;
    }
    .color-btn {
      width: 26px;
      height: 26px;
      padding: 0;
      border-radius: 999px;
      min-width: 26px;
      background: transparent;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.12);
    }
    .color-btn.active { border: 2px solid var(--accent); }
    .tool-btn .icon {
      width: 18px;
      height: 18px;
      display: block;
    }
    .tool-btn svg {
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .width-group { display: flex; align-items: center; gap: 6px; }
    .panel {
      display: none;
      align-items: center;
      gap: 6px;
      padding-left: 4px;
    }
    .group.open .panel { display: flex; }
    .toggle-btn {
      min-width: 44px;
      height: 32px;
      padding: 0 10px;
      position: relative;
    }
    .toggle-btn::after {
      content: '';
      width: 6px;
      height: 6px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg);
      margin-left: 6px;
      opacity: 0.7;
    }
    .group.open .toggle-btn::after {
      transform: rotate(-135deg);
    }
    .width-btn {
      min-width: 30px;
      height: 30px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .width-sample {
      display: block;
      width: var(--dot, 8px);
      height: var(--dot, 8px);
      background: #222;
      border-radius: 999px;
    }
    #canvas-wrap { flex: 1; position: relative; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    .spacer { flex: 1 1 auto; }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <div class="group">
        <button class="tool-btn" data-tool="pen" title="Pen" aria-label="Pen">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <line x1="4" y1="20" x2="20" y2="4"></line>
            <line x1="14" y1="4" x2="20" y2="10"></line>
          </svg>
        </button>
        <button class="tool-btn" data-tool="line" title="Line" aria-label="Line">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <line x1="4" y1="12" x2="20" y2="12"></line>
          </svg>
        </button>
        <button class="tool-btn" data-tool="circle" title="Circle" aria-label="Circle">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="7"></circle>
          </svg>
        </button>
        <button class="tool-btn" data-tool="select" title="Select" aria-label="Select">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="7" stroke-dasharray="3 3"></circle>
          </svg>
        </button>
        <button class="tool-btn" data-tool="erase-pixel" title="Eraser" aria-label="Eraser">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="5" y="7" width="10" height="8" rx="2"></rect>
            <line x1="9" y1="17" x2="20" y2="17"></line>
          </svg>
        </button>
        <button class="tool-btn" data-tool="erase-object" title="Object Erase" aria-label="Object Erase">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="6" y="6" width="12" height="12" rx="2"></rect>
            <line x1="9" y1="9" x2="15" y2="15"></line>
            <line x1="15" y1="9" x2="9" y2="15"></line>
          </svg>
        </button>
      </div>

      <div class="group width-group" id="width-group">
        <button class="toggle-btn" id="toggle-width" title="Stroke" aria-label="Stroke">Stroke</button>
        <div class="panel" id="width-panel">
          <button class="width-btn" data-width="2" style="--dot:2px"><span class="width-sample"></span></button>
          <button class="width-btn" data-width="4" style="--dot:4px"><span class="width-sample"></span></button>
          <button class="width-btn" data-width="6" style="--dot:6px"><span class="width-sample"></span></button>
          <button class="width-btn" data-width="8" style="--dot:8px"><span class="width-sample"></span></button>
          <button class="width-btn" data-width="12" style="--dot:12px"><span class="width-sample"></span></button>
          <button class="width-btn" data-width="16" style="--dot:16px"><span class="width-sample"></span></button>
        </div>
      </div>

      <div class="group" id="color-group">
        <button class="toggle-btn" id="toggle-color" title="Color" aria-label="Color">Color</button>
        <div class="panel" id="color-panel">
          <button class="color-btn" data-color="#111111" style="background:#111111;"></button>
          <button class="color-btn" data-color="#e53935" style="background:#e53935;"></button>
          <button class="color-btn" data-color="#1e88e5" style="background:#1e88e5;"></button>
          <button class="color-btn" data-color="#43a047" style="background:#43a047;"></button>
        </div>
      </div>

      <div class="group">
        <button class="action-btn" id="undo" title="Undo">↶</button>
        <button class="action-btn" id="redo" title="Redo">↷</button>
      </div>
    </div>
    <div id="canvas-wrap">
      <canvas id="c"></canvas>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
  <script>
    (function () {
      const canvasEl = document.getElementById('c');
      const wrapEl = document.getElementById('canvas-wrap');
      const canvas = new fabric.Canvas('c', {
        selection: false,
        preserveObjectStacking: true
      });
      const defaultPerPixelTargetFind = canvas.perPixelTargetFind;
      const defaultTargetFindTolerance = canvas.targetFindTolerance;

      canvas.upperCanvasEl.style.touchAction = 'none';

      function resizeCanvas() {
        const rect = wrapEl.getBoundingClientRect();
        canvas.setWidth(rect.width);
        canvas.setHeight(rect.height);
        canvas.requestRenderAll();
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      const toolButtons = Array.from(document.querySelectorAll('.tool-btn'));
      const colorButtons = Array.from(document.querySelectorAll('.color-btn'));
      const widthButtons = Array.from(document.querySelectorAll('.width-btn'));
      const toggleWidthBtn = document.getElementById('toggle-width');
      const toggleColorBtn = document.getElementById('toggle-color');
      const widthGroup = document.getElementById('width-group');
      const colorGroup = document.getElementById('color-group');
      const undoBtn = document.getElementById('undo');
      const redoBtn = document.getElementById('redo');

      let currentTool = 'pen';
      let currentColor = '#111111';
      let currentWidth = 4;
      let penBrush = null;
      let pixelEraserBrush = null;

      const undoStack = [];
      const redoStack = [];

      function updateUndoRedo() {
        undoBtn.disabled = undoStack.length === 0;
        redoBtn.disabled = redoStack.length === 0;
      }

      function pushAction(action) {
        undoStack.push(action);
        redoStack.length = 0;
        updateUndoRedo();
      }

      function snapshot(obj) {
        return {
          left: obj.left,
          top: obj.top,
          scaleX: obj.scaleX,
          scaleY: obj.scaleY,
          angle: obj.angle,
          skewX: obj.skewX,
          skewY: obj.skewY,
          flipX: obj.flipX,
          flipY: obj.flipY
        };
      }

      function applyState(obj, state) {
        obj.set(state);
        obj.setCoords();
      }

      function undo() {
        const action = undoStack.pop();
        if (!action) return;
        if (action.type === 'add') {
          action.objects.forEach(obj => canvas.remove(obj));
        } else if (action.type === 'remove') {
          action.objects
            .slice()
            .sort((a, b) => a.index - b.index)
            .forEach(item => {
              canvas.insertAt(item.obj, item.index, false);
              item.obj.setCoords();
            });
        } else if (action.type === 'modify') {
          action.targets.forEach(t => applyState(t.obj, t.before));
        }
        redoStack.push(action);
        canvas.requestRenderAll();
        updateUndoRedo();
      }

      function redo() {
        const action = redoStack.pop();
        if (!action) return;
        if (action.type === 'add') {
          action.objects.forEach(obj => canvas.add(obj));
        } else if (action.type === 'remove') {
          action.objects.forEach(item => canvas.remove(item.obj));
        } else if (action.type === 'modify') {
          action.targets.forEach(t => applyState(t.obj, t.after));
        }
        undoStack.push(action);
        canvas.requestRenderAll();
        updateUndoRedo();
      }

      undoBtn.addEventListener('click', undo);
      redoBtn.addEventListener('click', redo);
      updateUndoRedo();

      function setTool(tool) {
        currentTool = tool;
        toolButtons.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.tool === tool);
        });
        if (tool === 'pen') {
          canvas.isDrawingMode = true;
          canvas.selection = false;
          canvas.skipTargetFind = true;
          if (penBrush) canvas.freeDrawingBrush = penBrush;
        } else if (tool === 'erase-pixel') {
          canvas.isDrawingMode = true;
          canvas.selection = false;
          canvas.skipTargetFind = true;
          if (pixelEraserBrush) canvas.freeDrawingBrush = pixelEraserBrush;
        } else if (tool === 'select') {
          canvas.isDrawingMode = false;
          canvas.selection = false;
          canvas.skipTargetFind = false;
        } else if (tool === 'erase-object') {
          canvas.isDrawingMode = false;
          canvas.selection = false;
          canvas.skipTargetFind = false;
          canvas.perPixelTargetFind = true;
          canvas.targetFindTolerance = 0;
        } else {
          canvas.isDrawingMode = false;
          canvas.selection = false;
          canvas.skipTargetFind = true;
        }
        if (tool !== 'erase-object') {
          canvas.perPixelTargetFind = defaultPerPixelTargetFind;
          canvas.targetFindTolerance = defaultTargetFindTolerance;
        }
        if (tool !== 'select') {
          canvas.discardActiveObject();
          canvas.requestRenderAll();
        }
      }

      toolButtons.forEach(btn => {
        btn.addEventListener('click', () => setTool(btn.dataset.tool));
      });

      function closePanels(except) {
        if (except !== widthGroup) widthGroup.classList.remove('open');
        if (except !== colorGroup) colorGroup.classList.remove('open');
        toggleWidthBtn.classList.toggle('active', widthGroup.classList.contains('open'));
        toggleColorBtn.classList.toggle('active', colorGroup.classList.contains('open'));
      }

      toggleWidthBtn.addEventListener('click', () => {
        widthGroup.classList.toggle('open');
        closePanels(widthGroup);
      });

      toggleColorBtn.addEventListener('click', () => {
        colorGroup.classList.toggle('open');
        closePanels(colorGroup);
      });
      closePanels();

      colorButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          currentColor = btn.dataset.color;
          colorButtons.forEach(b => b.classList.toggle('active', b === btn));
          if (penBrush) {
            penBrush.color = currentColor;
          }
          if (canvas.freeDrawingBrush === penBrush) {
            canvas.freeDrawingBrush.color = currentColor;
          }
          closePanels(colorGroup);
        });
      });

      function setWidth(width) {
        currentWidth = width;
        if (penBrush) penBrush.width = currentWidth;
        if (pixelEraserBrush) pixelEraserBrush.width = currentWidth;
        widthButtons.forEach(btn => {
          btn.classList.toggle('active', parseInt(btn.dataset.width, 10) === width);
        });
      }

      widthButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          setWidth(parseInt(btn.dataset.width, 10));
          closePanels(widthGroup);
        });
      });

      penBrush = new fabric.PencilBrush(canvas);
      penBrush.decimate = 0.35;
      penBrush.strokeLineCap = 'round';
      penBrush.strokeLineJoin = 'round';

      pixelEraserBrush = new fabric.PencilBrush(canvas);
      pixelEraserBrush.decimate = 0.2;
      pixelEraserBrush.color = '#ffffff';
      pixelEraserBrush.globalCompositeOperation = 'destination-out';
      pixelEraserBrush.strokeLineCap = 'round';
      pixelEraserBrush.strokeLineJoin = 'round';

      colorButtons[0].click();
      setWidth(4);
      setTool('pen');

      canvas.on('path:created', (opt) => {
        const path = opt.path;
        if (currentTool === 'erase-pixel') {
          path.stroke = '#ffffff';
          path.globalCompositeOperation = 'destination-out';
          path.selectable = false;
          path.evented = false;
          path._isEraserPath = true;
        } else {
          path.selectable = true;
          path.evented = true;
          path.strokeUniform = true;
        }
        path.setCoords();
        pushAction({ type: 'add', objects: [path] });
      });

      // Transform tracking
      let pendingTransform = null;
      canvas.on('before:transform', (opt) => {
        const target = opt.transform && opt.transform.target;
        if (!target) return;
        if (target.type === 'activeSelection') {
          pendingTransform = {
            type: 'modify',
            targets: target._objects.map(obj => ({ obj, before: snapshot(obj) }))
          };
        } else {
          pendingTransform = {
            type: 'modify',
            targets: [{ obj: target, before: snapshot(target) }]
          };
        }
      });

      canvas.on('object:modified', () => {
        if (!pendingTransform) return;
        pendingTransform.targets.forEach(t => {
          t.after = snapshot(t.obj);
        });
        pushAction(pendingTransform);
        pendingTransform = null;
      });

      // Pointer helpers
      function getCanvasPointFromClient(clientX, clientY) {
        const rect = canvas.upperCanvasEl.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        const pt = new fabric.Point(x, y);
        return fabric.util.transformPoint(pt, fabric.util.invertTransform(canvas.viewportTransform));
      }

      // Lasso selection
      let lassoPath = null;
      let lassoPoints = [];
      let lassoPointerId = null;
      let isLassoDrawing = false;

      function pointInPoly(point, poly) {
        let inside = false;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
          const xi = poly[i].x, yi = poly[i].y;
          const xj = poly[j].x, yj = poly[j].y;
          const intersect = ((yi > point.y) !== (yj > point.y)) &&
            (point.x < (xj - xi) * (point.y - yi) / (yj - yi + 0.0000001) + xi);
          if (intersect) inside = !inside;
        }
        return inside;
      }

      function finalizeLasso() {
        if (lassoPath) {
          canvas.remove(lassoPath);
          lassoPath = null;
        }
        canvas.skipTargetFind = false;
        if (lassoPoints.length < 3) {
          canvas.discardActiveObject();
          canvas.requestRenderAll();
          return;
        }

        const objects = canvas.getObjects().filter(obj => obj !== lassoPath && !obj._isEraserPath);
        const selected = [];
        objects.forEach(obj => {
          const corners = obj.getCoords();
          const allInside = corners.every(pt => pointInPoly({ x: pt.x, y: pt.y }, lassoPoints));
          if (allInside) selected.push(obj);
        });

        if (selected.length === 1) {
          canvas.setActiveObject(selected[0]);
        } else if (selected.length > 1) {
          const sel = new fabric.ActiveSelection(selected, { canvas: canvas });
          canvas.setActiveObject(sel);
        } else {
          canvas.discardActiveObject();
        }
        canvas.requestRenderAll();
      }

      // Line tool
      let tempLine = null;
      let lineStart = null;
      let isLineDrawing = false;

      function startLine(point) {
        isLineDrawing = true;
        lineStart = point;
        tempLine = new fabric.Line([point.x, point.y, point.x, point.y], {
          stroke: currentColor,
          strokeWidth: currentWidth,
          selectable: true,
          evented: true,
          strokeLineCap: 'round',
          strokeLineJoin: 'round'
        });
        tempLine.strokeUniform = true;
        canvas.add(tempLine);
      }

      function updateLine(point) {
        if (!tempLine) return;
        tempLine.set({ x2: point.x, y2: point.y });
        tempLine.setCoords();
        canvas.requestRenderAll();
      }

      function finishLine() {
        if (!tempLine) return;
        pushAction({ type: 'add', objects: [tempLine] });
        tempLine = null;
        isLineDrawing = false;
      }

      // Circle tool
      let tempCircle = null;
      let circleCenter = null;
      let isCircleDrawing = false;

      function startCircle(point) {
        isCircleDrawing = true;
        circleCenter = point;
        tempCircle = new fabric.Circle({
          left: point.x,
          top: point.y,
          radius: 0.1,
          stroke: currentColor,
          strokeWidth: currentWidth,
          fill: 'transparent',
          selectable: true,
          evented: true,
          originX: 'center',
          originY: 'center'
        });
        tempCircle.strokeUniform = true;
        canvas.add(tempCircle);
      }

      function updateCircle(point) {
        if (!tempCircle || !circleCenter) return;
        const dx = point.x - circleCenter.x;
        const dy = point.y - circleCenter.y;
        const radius = Math.max(1, Math.hypot(dx, dy));
        tempCircle.set({ radius: radius });
        tempCircle.setCoords();
        canvas.requestRenderAll();
      }

      function finishCircle() {
        if (!tempCircle) return;
        pushAction({ type: 'add', objects: [tempCircle] });
        tempCircle = null;
        isCircleDrawing = false;
      }

      // Object eraser
      let isObjectErasing = false;
      let erasedItems = [];
      let erasedSet = new Set();

      function removeObject(obj) {
        if (!obj || obj._isEraserPath) return;
        if (erasedSet.has(obj)) return;
        const index = canvas.getObjects().indexOf(obj);
        erasedSet.add(obj);
        erasedItems.push({ obj, index });
        canvas.remove(obj);
      }

      function eraseAtEvent(e) {
        const target = canvas.findTarget(e);
        if (!target) return;
        if (target.type === 'activeSelection') {
          target._objects.forEach(removeObject);
          canvas.discardActiveObject();
        } else {
          removeObject(target);
        }
      }

      function startObjectErase(e) {
        isObjectErasing = true;
        erasedItems = [];
        erasedSet = new Set();
        eraseAtEvent(e);
      }

      function finishObjectErase() {
        if (!isObjectErasing) return;
        if (erasedItems.length > 0) {
          pushAction({ type: 'remove', objects: erasedItems });
        }
        isObjectErasing = false;
        erasedItems = [];
        erasedSet = new Set();
      }

      // Pinch zoom + pan
      const pointers = new Map();
      let isGesturing = false;
      let gestureState = null;
      let blockDrawing = false;
      let drawDelayTimer = null;
      let pendingDraw = null;

      const originalMouseDownInDrawingMode = canvas._onMouseDownInDrawingMode.bind(canvas);
      const originalMouseMoveInDrawingMode = canvas._onMouseMoveInDrawingMode.bind(canvas);

      canvas._onMouseDownInDrawingMode = function (e) {
        if (blockDrawing) return;
        return originalMouseDownInDrawingMode(e);
      };
      canvas._onMouseMoveInDrawingMode = function (e) {
        if (blockDrawing) return;
        return originalMouseMoveInDrawingMode(e);
      };

      function cancelPendingDraw() {
        if (drawDelayTimer) {
          clearTimeout(drawDelayTimer);
          drawDelayTimer = null;
        }
        pendingDraw = null;
      }

      function scheduleTouchDraw(e) {
        cancelPendingDraw();
        blockDrawing = true;
        pendingDraw = { e, pointerId: e.pointerId };
        drawDelayTimer = setTimeout(() => {
          if (!pendingDraw) return;
          blockDrawing = false;
          if (currentTool === 'pen' || currentTool === 'erase-pixel') {
            originalMouseDownInDrawingMode(pendingDraw.e);
          }
          pendingDraw = null;
        }, 90);
      }

      function getPointerInfo(e) {
        return { x: e.clientX, y: e.clientY, type: e.pointerType };
      }

      function isTwoTouchGesture() {
        if (pointers.size < 2) return false;
        const vals = Array.from(pointers.values());
        return vals[0].type === 'touch' && vals[1].type === 'touch';
      }

      function startGesture() {
        cancelPendingDraw();
        blockDrawing = true;
        const vals = Array.from(pointers.values());
        const p1 = vals[0];
        const p2 = vals[1];
        const mid = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
        const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
        isGesturing = true;
        gestureState = {
          startDist: dist,
          startZoom: canvas.getZoom(),
          lastMid: mid
        };
        canvas.isDrawingMode = false;
        isLassoDrawing = false;
        isLineDrawing = false;
        isCircleDrawing = false;
        isObjectErasing = false;
        erasedItems = [];
        erasedSet = new Set();
      }

      function updateGesture() {
        if (!gestureState) return;
        const vals = Array.from(pointers.values());
        if (vals.length < 2) return;
        const p1 = vals[0];
        const p2 = vals[1];
        const mid = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
        const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
        const scale = dist / gestureState.startDist;
        const newZoom = Math.min(4, Math.max(0.5, gestureState.startZoom * scale));
        const zoomPoint = getCanvasPointFromClient(mid.x, mid.y);
        canvas.zoomToPoint(zoomPoint, newZoom);
        const dx = mid.x - gestureState.lastMid.x;
        const dy = mid.y - gestureState.lastMid.y;
        const vpt = canvas.viewportTransform;
        vpt[4] += dx;
        vpt[5] += dy;
        canvas.requestRenderAll();
        gestureState.lastMid = mid;
      }

      function endGesture() {
        isGesturing = false;
        gestureState = null;
        blockDrawing = false;
        if (currentTool === 'pen' || currentTool === 'erase-pixel') {
          canvas.isDrawingMode = true;
        }
      }

      function pointerDown(e) {
        canvas.upperCanvasEl.setPointerCapture(e.pointerId);
        pointers.set(e.pointerId, getPointerInfo(e));

        if (isTwoTouchGesture()) {
          startGesture();
          return;
        }
        if (isGesturing) return;

        const point = canvas.getPointer(e);
        if ((currentTool === 'pen' || currentTool === 'erase-pixel') && e.pointerType === 'touch') {
          scheduleTouchDraw(e);
        }
        if (currentTool === 'erase-object') {
          startObjectErase(e);
          return;
        }
        if (currentTool === 'line') {
          startLine(point);
        } else if (currentTool === 'circle') {
          startCircle(point);
        } else if (currentTool === 'select') {
          const target = canvas.findTarget(e);
          const active = canvas.getActiveObject();
          if (target) return;
          if (active) {
            const rect = active.getBoundingRect(true, true);
            const insideActiveBounds =
              point.x >= rect.left &&
              point.x <= rect.left + rect.width &&
              point.y >= rect.top &&
              point.y <= rect.top + rect.height;
            if (insideActiveBounds) return;
          }
          canvas.discardActiveObject();
          canvas.requestRenderAll();
          isLassoDrawing = true;
          lassoPointerId = e.pointerId;
          canvas.skipTargetFind = true;
          lassoPoints = [point];
          lassoPath = new fabric.Polyline(lassoPoints, {
            fill: '',
            stroke: '#0a84ff',
            strokeWidth: 2,
            selectable: false,
            evented: false,
            strokeDashArray: [6, 4],
            objectCaching: false
          });
          canvas.add(lassoPath);
          canvas.bringToFront(lassoPath);
        }
      }

      function pointerMove(e) {
        if (pointers.has(e.pointerId)) {
          pointers.set(e.pointerId, getPointerInfo(e));
        }

        if (isGesturing) {
          updateGesture();
          return;
        }

        const point = canvas.getPointer(e);
        if (pendingDraw && pendingDraw.pointerId === e.pointerId) {
          pendingDraw.e = e;
        }
        if (currentTool === 'erase-object' && isObjectErasing) {
          eraseAtEvent(e);
          return;
        }
        if (currentTool === 'line' && isLineDrawing) {
          updateLine(point);
        } else if (currentTool === 'circle' && isCircleDrawing) {
          updateCircle(point);
        } else if (currentTool === 'select' && isLassoDrawing && e.pointerId === lassoPointerId) {
          const last = lassoPoints[lassoPoints.length - 1];
          const dist = Math.hypot(point.x - last.x, point.y - last.y);
          if (dist > 2) {
            lassoPoints.push(point);
            lassoPath.set({ points: lassoPoints });
            lassoPath.setCoords();
            canvas.bringToFront(lassoPath);
            canvas.requestRenderAll();
          }
        }
      }

      function pointerUp(e) {
        pointers.delete(e.pointerId);
        if (isGesturing) {
          if (pointers.size < 2) endGesture();
          return;
        }

        if (pendingDraw && pendingDraw.pointerId === e.pointerId) {
          cancelPendingDraw();
          blockDrawing = false;
        }
        if (currentTool === 'erase-object' && isObjectErasing) {
          finishObjectErase();
          return;
        }
        if (currentTool === 'line' && isLineDrawing) {
          finishLine();
        } else if (currentTool === 'circle' && isCircleDrawing) {
          finishCircle();
        } else if (currentTool === 'select' && isLassoDrawing && e.pointerId === lassoPointerId) {
          isLassoDrawing = false;
          lassoPointerId = null;
          finalizeLasso();
        }
      }

      canvas.upperCanvasEl.addEventListener('pointerdown', pointerDown);
      canvas.upperCanvasEl.addEventListener('pointermove', pointerMove);
      canvas.upperCanvasEl.addEventListener('pointerup', pointerUp);
      canvas.upperCanvasEl.addEventListener('pointercancel', pointerUp);
    })();
  </script>
</body>
</html>
